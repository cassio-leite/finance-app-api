services:
    postgres:
        image: postgres:17
        container_name: finance-app-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: finance_app
            POSTGRES_HOST_AUTH_METHOD: md5
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data: